name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nakavid
          POSTGRES_USER: nakavid
          POSTGRES_PASSWORD: nakavid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nakavid -d nakavid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      POSTGRES_DB: nakavid
      POSTGRES_USER: nakavid
      POSTGRES_PASSWORD: nakavid
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      NAKAVID_STORAGE_ROOT: ./data/nakavid/
      DJANGO_SECRET_KEY: ci-not-secret
      DJANGO_DEBUG: 0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build React islands
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Django system checks
        run: uv run python3 manage.py check

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: Tests
        run: uv run pytest
